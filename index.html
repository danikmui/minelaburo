<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MineClass · Etiquetar</title>
<style>
  body{font-family:'Raleway',Arial,sans-serif;max-width:620px;margin:40px auto;color:#3B1164;}
  h1{color:#3B1164;}
  textarea{width:100%;height:90px;padding:10px;border:2px solid #ECE5F3;border-radius:10px;font-size:15px;}
  button{background:#F05948;color:#fff;border:none;padding:11px 18px;border-radius:10px;font-weight:bold;cursor:pointer;font-size:15px;}
  button:hover{background:#D8412C;}
  .chip{display:inline-block;background:#ECE5F3;color:#3B1164;padding:5px 12px;border-radius:999px;margin:3px;font-weight:600;}
  .error{color:#D8412C;font-weight:600;}
  .small{color:#888;font-size:12px;word-break:break-all;}
</style>
</head>
<body>
  <h1>⛏️ Etiquetar perfil</h1>
  <p>Escribe algo y Clarita (el Python) lo etiqueta:</p>
  <textarea id="texto">operador de camión minero</textarea>
  <br><br>
  <button onclick="etiquetar()">Analizar con Clarita</button>
  <div id="resultado" style="margin-top:22px;"></div>
  <p class="small" id="apiurl"></p>

<script>
// ⬇️ ESTA es la conexión: la dirección de tu API en Render (o local).
const API = "https://minelaburo2.onrender.com/etiquetar";

// muestra abajo qué dirección está usando (para que veas si es la correcta)
document.getElementById("apiurl").textContent = "Conectando a: " + API;

async function etiquetar() {
  const salida = document.getElementById("resultado");
  const texto = document.getElementById("texto").value;

  // aviso de "cargando" (la 1ª vez Render tarda ~40s en despertar)
  salida.innerHTML = "⏳ Analizando... (si es la primera vez, puede tardar ~40 segundos mientras la API despierta)";

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ texto: texto })
    });

    if (!res.ok) {
      salida.innerHTML = '<span class="error">❌ La API respondió con un error (código ' + res.status + ').</span>';
      return;
    }

    const data = await res.json();
    const chips = data.etiquetas.map(e => '<span class="chip">' + e + '</span>').join(" ");
    salida.innerHTML = "<b>Etiquetas:</b> " + chips;

  } catch (e) {
    // si no se pudo ni conectar, lo decimos claramente
    salida.innerHTML = '<span class="error">❌ No pude conectar con la API.</span><br>'
      + '<span class="small">Detalle: ' + e.message + '<br>'
      + 'Revisa que la dirección de arriba sea la de Render (https) + /etiquetar, '
      + 'y que la API esté despierta (ábrela con /docs en el navegador).</span>';
    console.error("Error de conexión:", e);
  }
}
</script>
</body>
</html>
